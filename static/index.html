<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Background Remover</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-grad-1: #0f172a;
            --bg-grad-2: #1e1b4b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--bg-grad-1), var(--bg-grad-2));
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            overflow-x: hidden;
        }

        /* Ambient background glow */
        .ambient-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(to right, #a855f7, #6366f1, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            animation: float 6s ease-in-out infinite;
        }

        p.subtitle {
            font-size: 1.2rem;
            color: var(--text-muted);
        }

        .upload-area {
            background: var(--glass-bg);
            border: 2px dashed var(--glass-border);
            border-radius: 24px;
            padding: 4rem 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .upload-area:hover, .upload-area.dragover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.2);
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: inline-block;
        }

        input[type="file"] {
            display: none;
        }

        .workspace {
            display: none;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-top: 2rem;
        }

        .workspace.active {
            display: grid;
        }

        @media (max-width: 768px) {
            .workspace.active {
                grid-template-columns: 1fr;
            }
        }

        .image-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 1.5rem;
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .image-card h3 {
            font-weight: 600;
            color: var(--text-main);
            text-align: center;
        }

        .image-preview-container {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 16px;
            overflow: hidden;
            background: repeating-conic-gradient(rgba(255,255,255,0.1) 0% 25%, transparent 0% 50%) 50% / 20px 20px;
            background-color: rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .image-preview-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: transform 0.3s ease;
        }

        .image-preview-container:hover img {
            transform: scale(1.02);
        }

        .loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(4px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            z-index: 10;
        }

        .loading-overlay.active {
            display: flex;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--glass-border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            text-decoration: none;
            width: 100%;
        }

        .btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
        }

        .btn-outline:hover {
            background: rgba(99, 102, 241, 0.1);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>
    <div class="ambient-glow"></div>
    
    <div class="container">
        <header>
            <h1>Magic BG Remover</h1>
            <p class="subtitle">Instantly remove backgrounds from your images using AI</p>
        </header>

        <div class="upload-area" id="dropZone" onclick="document.getElementById('fileInput').click()">
            <div class="upload-icon">✨</div>
            <h2>Drag & drop your image here</h2>
            <p class="subtitle" style="margin-top: 0.5rem">or click to browse from your device</p>
            <input type="file" id="fileInput" accept="image/png, image/jpeg, image/webp">
        </div>

        <div class="workspace" id="workspace">
            <!-- Original Image Card -->
            <div class="image-card">
                <h3>Original Image</h3>
                <div class="image-preview-container">
                    <img id="originalPreview" src="" alt="Original">
                </div>
                <button class="btn btn-outline" onclick="document.getElementById('fileInput').click()">
                    Upload Another
                </button>
            </div>

            <!-- Result Image Card -->
            <div class="image-card">
                <h3>Processed Image</h3>
                <div class="image-preview-container" id="resultContainer">
                    <img id="resultPreview" src="" alt="Processed" style="display: none;">
                    
                    <div class="loading-overlay" id="loadingOverlay">
                        <div class="spinner"></div>
                        <p>Working magic...</p>
                    </div>
                </div>
                <a id="downloadBtn" class="btn" style="pointer-events: none; opacity: 0.5;">
                    Download Result ⬇️
                </a>
            </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const workspace = document.getElementById('workspace');
        const originalPreview = document.getElementById('originalPreview');
        const resultPreview = document.getElementById('resultPreview');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const downloadBtn = document.getElementById('downloadBtn');

        // Drag and drop handlers
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults (e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.add('dragover'), false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.remove('dragover'), false);
        });

        dropZone.addEventListener('drop', (e) => {
            const dt = e.dataTransfer;
            const files = dt.files;
            if (files.length > 0) {
                fileInput.files = files;
                handleFileSelect();
            }
        });

        fileInput.addEventListener('change', handleFileSelect);

        function handleFileSelect() {
            const file = fileInput.files[0];
            if (!file) return;
            
            // Basic validation
            if (!file.type.startsWith('image/')) {
                alert('Please upload an image file.');
                return;
            }

            // Show workspace, hide upload area
            dropZone.style.display = 'none';
            workspace.classList.add('active');

            // Reset result side
            resultPreview.style.display = 'none';
            resultPreview.src = '';
            downloadBtn.style.pointerEvents = 'none';
            downloadBtn.style.opacity = '0.5';
            downloadBtn.removeAttribute('href');
            downloadBtn.removeAttribute('download');

            // Preview original
            const reader = new FileReader();
            reader.onload = (e) => {
                originalPreview.src = e.target.result;
            }
            reader.readAsDataURL(file);

            // Process image
            processImage(file);
        }

        async function processImage(file) {
            loadingOverlay.classList.add('active');
            
            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/api/remove-bg', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) throw new Error('Failed to process image');

                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                
                resultPreview.src = url;
                resultPreview.style.display = 'block';
                
                // Setup download button
                downloadBtn.href = url;
                downloadBtn.download = `bg-removed-${file.name.replace(/\.[^/.]+$/, "")}.png`;
                downloadBtn.style.pointerEvents = 'auto';
                downloadBtn.style.opacity = '1';

            } catch (error) {
                console.error('Error:', error);
                alert('An error occurred while processing the image. Please try again.');
            } finally {
                loadingOverlay.classList.remove('active');
            }
        }
    </script>
</body>
</html>
